name: Build and Release Minecraft Mod

on:
  push:
    branches:
      - main  # Or the branch you prefer
  pull_request:
    branches:
      - main  # Or the branch you prefer

permissions:
  contents: write
  actions: read
  issues: read

jobs:
  build:
    strategy:
      matrix:
        java: [
          21,    # Current Java LTS
        ]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'microsoft'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build --stacktrace

      - name: List build/libs directory for debugging
        run: ls -l build/libs  # Check the contents of the build/libs folder

      - name: Capture build artifacts
        if: ${{ matrix.java == '21' }}
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/*.jar  # Ensure this matches the location of your .jar file

  release:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts
          path: ./artifacts  # This is the directory where the artifact will be downloaded

      - name: Capture Gradle version from gradle.properties
        id: version
        run: |
          VERSION=$(grep -oP 'mod_version=\K.*' gradle.properties)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate changelog
        id: changelog
        run: |
          echo "Changelog for version ${{ env.VERSION }}" > changelog.txt
          git log -1 --oneline --no-merges ${{ github.sha }} >> changelog.txt

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "v1.21-${{ env.VERSION }}"
          release_name: "Release 1.21-${{ env.VERSION }}"
          body: |
            ## Changelog:
            $(cat changelog.txt)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets to GitHub
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/*.jar  # Path to the downloaded artifact
          asset_name: mod-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive

  modrinth_upload:
    runs-on: ubuntu-22.04
    needs: release
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts
          path: ./artifacts  # Download the artifact to the ./artifacts directory

      - name: Upload to Modrinth
        uses: modrinth/modrinth-upload@v1
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project_id: <your-modrinth-project-id>
          file: ./artifacts/*.jar  # Path to the downloaded artifact
          version_number: "1.21-${{ env.VERSION }}"
          version_name: "Version 1.21-${{ env.VERSION }}"
          changelog: "$(cat changelog.txt)"
          dependencies: "fabric-api"

  discord_notify:
    runs-on: ubuntu-22.04
    needs: [build, release, modrinth_upload]
    steps:
      - name: Notify Discord
        uses: Ilshidur/action-discord@v2
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          message: |
            Build ${{ github.run_number }} completed successfully:
            - Status: ${{ job.status }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - Version: 1.21-${{ env.VERSION }}