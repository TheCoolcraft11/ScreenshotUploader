name: build
on: [pull_request, push]

permissions:
  contents: write
  actions: read
  issues: read

jobs:
  build:
    strategy:
      matrix:
        java: [
          21,    # Current Java LTS
        ]
    runs-on: ubuntu-22.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: validate gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: setup jdk ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build

      - name: capture build artifacts
        if: ${{ matrix.java == '21' }}
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/

  release:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: Capture Gradle version from gradle.properties
        id: version
        run: |
          VERSION=$(grep -oP 'version=\K.*' gradle.properties)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: generate changelog
        id: changelog
        run: |
          echo "Changelog for version ${{ env.VERSION }}" > changelog.txt
          git log -1 --oneline --no-merges ${{ github.sha }} >> changelog.txt

      - name: create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "v1.21-${{ env.VERSION }}"
          release_name: "Release 1.21-${{ env.VERSION }}"
          body: |
            ## Changelog:
            $(cat changelog.txt)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: upload release assets to GitHub
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/libs/*.jar
          asset_name: mod-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive

  modrinth_upload:
    runs-on: ubuntu-22.04
    needs: release
    steps:
      - name: Upload to Modrinth
        uses: modrinth/modrinth-upload@v1
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project_id: <your-modrinth-project-id>
          file: build/libs/*.jar
          version_number: "1.21-${{ env.VERSION }}"
          version_name: "Version 1.21-${{ env.VERSION }}"
          changelog: "$(cat changelog.txt)"
          dependencies: "fabric-api"

  discord_notify:
    runs-on: ubuntu-22.04
    needs: [build, release, modrinth_upload]
    steps:
      - name: Notify Discord
        uses: Ilshidur/action-discord@v2
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          message: |
            Build ${{ github.run_number }} completed successfully:
            - Status: ${{ job.status }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - Version: 1.21-${{ env.VERSION }}