name: Build and Release Mod

on: 
  [push, pull_request]

permissions:
  contents: write       # Required to upload assets to the release
  actions: read         # Required for reading actions
  issues: read          # Required for reading issues (if used)
  packages: write       # Required for writing assets to packages (releases)

jobs:
  build:
    strategy:
      matrix:
        java: [21]  # Java version for the build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'microsoft'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod
        run: ./gradlew build --stacktrace

      - name: Capture build artifacts
        if: ${{ matrix.java == '21' }}
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/*.jar  # Adjust path if necessary

  release:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts  # Ensure this matches the artifact name from the build job
          path: ./artifacts

      - name: List contents of ./artifacts directory
        run: ls -l ./artifacts  # Check what files are in the artifacts folder

      - name: Capture Gradle version from gradle.properties
        id: version
        run: |
          VERSION=$(grep -oP 'mod_version=\K.*' gradle.properties)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate changelog
        id: changelog
        run: |
          echo "Changelog for version ${{ env.VERSION }}" > changelog.txt
          git log -1 --oneline --no-merges ${{ github.sha }} >> changelog.txt

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: "v1.21-${{ env.VERSION }}"
          release_name: "Release 1.21-${{ env.VERSION }}"
          body: |
            ## Changelog:
            $(cat changelog.txt)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}  # Use the personal access token here

      - name: Upload release assets to GitHub
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./artifacts/*.jar  # Ensure this matches the path where the .jar is located
          asset_name: mod-${{ env.VERSION }}.jar
          asset_content_type: application/java-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}  # Use the personal access token here

  modrinth_upload:
    runs-on: ubuntu-22.04
    needs: release
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts
          path: ./artifacts

      - name: Upload to Modrinth
        uses: modrinth/modrinth-upload@v1
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project_id: <your-modrinth-project-id>  # Replace with your Modrinth project ID
          file: ./artifacts/*.jar  # Path to the downloaded artifact
          version_number: "1.21-${{ env.VERSION }}"
          version_name: "Version 1.21-${{ env.VERSION }}"
          changelog: "$(cat changelog.txt)"
          dependencies: "fabric-api"  # Replace with your dependencies if necessary

  discord_notify:
    runs-on: ubuntu-22.04
    needs: [build, release, modrinth_upload]
    steps:
      - name: Notify Discord
        uses: Ilshidur/action-discord@v2
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          message: |
            Build ${{ github.run_number }} completed successfully:
            - Status: ${{ job.status }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
            - Version: 1.21-${{ env.VERSION }}