name: Build and Release Minecraft Mod

on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adoptopenjdk'

      - name: Cache Gradle dependencies
        uses: actions/cache@v2
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Modrinth
        run: |
          curl -X POST "https://api.modrinth.com/v2/projects/YOUR_PROJECT_ID/version" \
          -H "Authorization: Bearer ${{ secrets.MODRINTH_API_KEY }}" \
          -F "file=@build/libs/YOUR_MOD_NAME-${{ steps.build.outputs.version }}.jar" \
          -F "version_number=${{ steps.build.outputs.version }}" \
          -F "game_versions[]=1.19" \
          -F "loaders[]=fabric"
        env:
          MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}