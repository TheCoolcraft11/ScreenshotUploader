name: Build and Upload Minecraft Mod

on: [pull_request, push]
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository
    - name: Checkout Repository
      uses: actions/checkout@v3

    # Set up Java JDK 17 (required for Minecraft modding)
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'adoptopenjdk'

    # Cache Gradle dependencies for faster builds
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # Build the mod with Gradle
    - name: Build Mod
      run: ./gradlew build

    # Upload the JAR to GitHub Releases
    - name: Upload JAR to GitHub Releases
      uses: ncipollo/release-action@v1
      with:
        artifacts: build/libs/*.jar
        tag: ${{ steps.version.outputs.version }}  # Ensure the tag is the same as the version number

    # Upload the JAR to Modrinth
    - name: Upload JAR to Modrinth
      run: |
        curl -X POST https://api.modrinth.com/v2/projects/your-project-id/versions \
          -H "Authorization: Bearer ${{ secrets.MODRINTH_API_KEY }}" \
          -F "file=@build/libs/your-mod-${{ steps.version.outputs.version }}.jar" \
          -F "loader=Fabric" \
          -F "game_versions=[\"1.18.2\"]" \
          -F "version_number=${{ steps.version.outputs.version }}" \
          -F "version_type=release" \
          -F "release_type=stable" \
          -F "changelog=Changelog for version ${{ steps.version.outputs.version }}" \
          -F "is_server_pack=false"
      env:
        MODRINTH_API_KEY: ${{ secrets.MODRINTH_API_KEY }}

    # Set the version dynamically from gradle.properties
    - name: Get Version from gradle.properties
      id: version
      run: |
        echo "VERSION=$(grep mod_version gradle.properties | cut -d'=' -f2)" >> $GITHUB_ENV
        echo "::set-output name=version::${{ env.VERSION }}"
